# EinVault — Production
# https://github.com/davefatkin/einvault
#
# 1. Edit ORIGIN below to match your domain
# 2. mkdir -p ./data
# 3. docker compose -f docker-compose.prod.yml up -d

services:
  einvault:
    image: ghcr.io/davefatkin/einvault:latest
    container_name: einvault
    restart: unless-stopped

    ports:
      - '127.0.0.1:3000:3000'

    volumes:
      - ./data:/data

    user: '1000:1000'

    environment:
      # Your public URL — must match the address you access EinVault from.
      # Used for CSRF protection; the app will reject form submissions without it.
      ORIGIN: https://einvault.yourdomain.com

      NODE_ENV: production
      DATABASE_URL: /data/einvault.db
      # Maximum image upload size in MB. BODY_SIZE_LIMIT is derived automatically.
      UPLOAD_MAX_MB: 10
      # Maximum journal video upload size in MB (stored as-is, no transcoding).
      VIDEO_MAX_MB: 100
      # Maximum journal photos and videos (combined) per companion per day.
      MAX_DAILY_MEDIA: 5
      # Default undo window (seconds) for dismissing a Reminder. 0 disables it.
      # Each user can override in their settings.
      REMINDER_UNDO_SECONDS: 7

      # Optional: server-side video transcoding (off by default).
      # Set VIDEO_TRANSCODE=true to transcode uploaded videos to H.264/AAC MP4
      # (+ poster) in the background so they play in every browser. ffmpeg ships
      # in the image. Transcoding is CPU-intensive — note the cpus limit below;
      # raise it if you enable this and process large clips. Scratch files are
      # written under /data (disk), never the 64 MB /tmp tmpfs.
      # VIDEO_TRANSCODE: 'true'
      # Keep the source video alongside the transcode (default true). The
      # original is never served; set false to discard it and save space.
      # VIDEO_KEEP_ORIGINAL: 'true'
      # Cost caps (input is stored as-is if it exceeds any): defaults shown.
      # VIDEO_TRANSCODE_MAX_MB: 100
      # VIDEO_TRANSCODE_MAX_SECONDS: 600
      # VIDEO_TRANSCODE_MAX_WIDTH: 4096
      # VIDEO_TRANSCODE_MAX_HEIGHT: 4096
      # VIDEO_TMP_DIR: /data/transcode-tmp

      # Set to your local timezone so dates and times display correctly.
      # Defaults to UTC if omitted. Example: America/New_York, Europe/London
      # TZ: America/New_York

      # Optional: external image storage (S3-compatible)
      # By default avatars and journal photos are written to /data/uploads.
      # Set STORAGE_BACKEND=s3 to route NEW uploads to an S3-compatible bucket
      # (AWS S3, Garage, MinIO, Backblaze B2, Cloudflare R2). Existing photos
      # remain on disk; per-row provider tracking keeps reads consistent.
      # Downloads use short-lived presigned URLs (302 redirect from the app).
      # STORAGE_BACKEND: s3
      # S3_ENDPOINT: https://s3.garage.example.com
      # S3_BUCKET: einvault
      # S3_REGION: auto
      # S3_ACCESS_KEY_ID:
      # S3_SECRET_ACCESS_KEY:
      # Set true for path-style endpoints (Garage, MinIO). Leave unset for AWS/R2.
      # S3_FORCE_PATH_STYLE: 'true'
      # Lifetime of a presigned download URL. Lower = stricter access.
      # S3_PRESIGN_TTL_SECONDS: 300

      # Optional: Immich integration (reference mode)
      # When set, users can attach existing Immich assets to journal entries
      # and avatars. EinVault stores a reference and proxies reads through
      # the API key; it never uploads or deletes from Immich.
      # IMMICH_URL: http://immich.local:2283
      # IMMICH_API_KEY:
      # Optional: restrict picker to a single Immich album.
      # IMMICH_ALBUM_ID:

      # Optional: SMTP email
      # Enables outbound mail and the self-service "Forgot password?" flow on
      # the login page. Disabled unless SMTP_HOST and SMTP_FROM are both set.
      # ORIGIN above must be correct: password reset links are built from it.
      # SMTP_HOST: smtp.example.com
      # SMTP_PORT: 587
      # Set true for implicit TLS (465). Default is STARTTLS on 587.
      # SMTP_SECURE: 'true'
      # Leave unset for unauthenticated LAN relays.
      # SMTP_USER:
      # SMTP_PASS:
      # SMTP_FROM: 'EinVault <einvault@example.com>'

      # Optional: ntfy push notifications
      # Configures the ntfy server only; each user sets their own topic under
      # Settings -> Notifications. Disabled unless NTFY_URL is set.
      # NTFY_URL: https://ntfy.sh
      # NTFY_TOKEN:

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m

    deploy:
      resources:
        limits:
          # 0.5 / 256M is plenty for the app itself. If you enable VIDEO_TRANSCODE,
          # raise both: transcoding bursts ffmpeg (capped at 2 threads, one job at
          # a time) and the worker buffers the whole clip in memory. Suggested with
          # transcoding on: cpus '1.5' (1.0 on a small host, 2.0 for fastest), and
          # memory 512M (1G if you allow large/4K clips) to avoid an OOM mid-job.
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M

    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
