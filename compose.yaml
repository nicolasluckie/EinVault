services:
  einvault:
    build: .
    container_name: einvault
    restart: unless-stopped

    volumes:
      - ./data:/data

    user: '1000:1000'

    environment:
      ORIGIN: https://einvault.example.com
      NODE_ENV: production
      DATABASE_URL: /data/einvault.db
      UPLOAD_MAX_MB: 100
      VIDEO_MAX_MB: 250
      MAX_DAILY_MEDIA: 10
      MAX_DOCUMENTS_PER_COMPANION: 200
      REMINDER_UNDO_SECONDS: 10
      # Admin credentials
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD:

    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - einvault_net

networks:
  einvault_net:
    external: true
